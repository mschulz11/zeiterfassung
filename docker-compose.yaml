# Portainer-Stack für Zeiterfassung – nur Production-Service
services:
  zeiterfassung:
    build:
      context: https://github.com/mschulz11/zeiterfassung.git
      target: prod
    image: zeiterfassung:latest
    container_name: zeiterfassung
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s