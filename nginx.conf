server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ----- SPA-Fallback -----
    # React Router nutzt HTML5-History – alle unbekannten Pfade zur index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----- Cache-Strategien -----
    # Service Worker & Manifest: niemals aggressiv cachen, sonst kriegt die
    # PWA nie Updates mit.
    location = /sw.js {
        add_header Cache-Control "no-cache" always;
        add_header Service-Worker-Allowed "/" always;
        add_header Content-Type "application/javascript; charset=utf-8" always;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache" always;
        add_header Content-Type "application/manifest+json; charset=utf-8" always;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache" always;
        add_header Content-Type "application/javascript; charset=utf-8" always;
    }
    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }

    # Hashed JS/CSS unter /assets/ – dürfen ewig gecacht werden
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Workbox-Helper (falls beim Release Pfad anders heißt)
    location ~* ^/workbox-.*\.js$ {
        add_header Cache-Control "no-cache" always;
    }

    # ----- Komprimierung -----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml;

    # ----- Security Header -----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
